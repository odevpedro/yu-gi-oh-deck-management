services:
  # ===== Banco do deck-service =====
  deck-db:
    image: postgres:16-alpine
    container_name: deck-db
    environment:
      POSTGRES_DB: deckdb
      POSTGRES_USER: deck_user
      POSTGRES_PASSWORD: deck_pass
    ports:
      - "5433:5432"
    volumes:
      - deck-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deck_user -d deckdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== Banco do card-creator-service =====
  creator-db:
    image: postgres:16-alpine
    container_name: creator-db
    environment:
      POSTGRES_DB: cardcreatordb
      POSTGRES_USER: creator_user
      POSTGRES_PASSWORD: creator_pass
    ports:
      - "5434:5432"
    volumes:
      - creator-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creator_user -d cardcreatordb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== Banco do auth-service =====
  auth-db:
    image: postgres:16-alpine
    container_name: auth-db
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
    ports:
      - "5435:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d authdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== Banco do community-service (PostGIS) =====
  community-db:
    image: postgis/postgis:16-3.4-alpine
    container_name: community-db
    environment:
      POSTGRES_DB: communitydb
      POSTGRES_USER: community_user
      POSTGRES_PASSWORD: community_pass
    ports:
      - "5436:5432"
    volumes:
      - community-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U community_user -d communitydb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== Zookeeper =====
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # ===== Kafka =====
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ===== auth-service =====
  auth-service:
    image: gradle:8.7-jdk17
    container_name: auth-service
    working_dir: /workspace
    command: sh -lc 'gradle --no-daemon --project-cache-dir /tmp/gradle-project-cache-auth :auth-service:bootJar && java -jar auth-service/build/libs/*.jar'
    ports:
      - "8086:8086"
    volumes:
      - ./:/workspace
      - gradle-cache:/home/gradle/.gradle
    depends_on:
      - auth-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-db:5432/authdb
      SPRING_DATASOURCE_USERNAME: auth_user
      SPRING_DATASOURCE_PASSWORD: auth_pass
      SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED: "false"
      JWT_SECRET: yugioh-deck-management-super-secret-key-256bits-minimum
      GRADLE_USER_HOME: /tmp/gradle-home-auth

  # ===== card-service =====
  card-service:
    image: gradle:8.7-jdk17
    container_name: card-service
    working_dir: /workspace
    command: sh -lc 'gradle --no-daemon --project-cache-dir /tmp/gradle-project-cache-card :card-service:bootJar && java -jar card-service/build/libs/*.jar'
    ports:
      - "8080:8080"
    volumes:
      - ./:/workspace
      - gradle-cache:/home/gradle/.gradle
    depends_on:
      - auth-service
    environment:
      AUTH_SERVICE_URL: http://auth-service:8086
      JWT_SECRET: yugioh-deck-management-super-secret-key-256bits-minimum
      GRADLE_USER_HOME: /tmp/gradle-home-card

  # ===== deck-service =====
  deck-service:
    image: gradle:8.7-jdk17
    container_name: deck-service
    working_dir: /workspace
    command: sh -lc 'gradle --no-daemon --project-cache-dir /tmp/gradle-project-cache-deck :deck-service:bootJar && java -jar deck-service/build/libs/*.jar'
    ports:
      - "8081:8081"
    volumes:
      - ./:/workspace
      - gradle-cache:/home/gradle/.gradle
    depends_on:
      - deck-db
      - auth-service
      - card-service
      - kafka
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://deck-db:5432/deckdb
      SPRING_DATASOURCE_USERNAME: deck_user
      SPRING_DATASOURCE_PASSWORD: deck_pass
      CARD_SERVICE_URL: http://card-service:8080
      AUTH_SERVICE_URL: http://auth-service:8086
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: yugioh-deck-management-super-secret-key-256bits-minimum
      GRADLE_USER_HOME: /tmp/gradle-home-deck

  # ===== card-creator-service =====
  card-creator-service:
    image: gradle:8.7-jdk17
    container_name: card-creator-service
    working_dir: /workspace
    command: sh -lc 'gradle --no-daemon --project-cache-dir /tmp/gradle-project-cache-creator :card-creator-service:bootJar && java -jar card-creator-service/build/libs/*.jar'
    ports:
      - "8083:8083"
    volumes:
      - ./:/workspace
      - gradle-cache:/home/gradle/.gradle
    depends_on:
      - creator-db
      - auth-service
      - kafka
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://creator-db:5432/cardcreatordb
      SPRING_DATASOURCE_USERNAME: creator_user
      SPRING_DATASOURCE_PASSWORD: creator_pass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AUTH_SERVICE_URL: http://auth-service:8086
      JWT_SECRET: yugioh-deck-management-super-secret-key-256bits-minimum
      GRADLE_USER_HOME: /tmp/gradle-home-creator

  # ===== proxy-service =====
  proxy-service:
    image: gradle:8.7-jdk17
    container_name: proxy-service
    working_dir: /workspace
    command: sh -lc 'gradle --no-daemon --project-cache-dir /tmp/gradle-project-cache-proxy :proxy-service:bootJar && java -jar proxy-service/build/libs/*.jar'
    ports:
      - "8085:8085"
    volumes:
      - ./:/workspace
      - gradle-cache:/home/gradle/.gradle
    depends_on:
      - deck-service
      - auth-service
    environment:
      DECK_SERVICE_URL: http://deck-service:8081
      AUTH_SERVICE_URL: http://auth-service:8086
      JWT_SECRET: yugioh-deck-management-super-secret-key-256bits-minimum
      GRADLE_USER_HOME: /tmp/gradle-home-proxy

  # ===== community-service =====
  community-service:
    image: gradle:8.7-jdk17
    container_name: community-service
    working_dir: /workspace
    command: sh -lc 'gradle --no-daemon --project-cache-dir /tmp/gradle-project-cache-community :community-service:bootJar && java -jar community-service/build/libs/*.jar'
    ports:
      - "8087:8087"
    volumes:
      - ./:/workspace
      - gradle-cache:/home/gradle/.gradle
    depends_on:
      - community-db
      - kafka
      - auth-service
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://community-db:5432/communitydb
      SPRING_DATASOURCE_USERNAME: community_user
      SPRING_DATASOURCE_PASSWORD: community_pass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AUTH_SERVICE_URL: http://auth-service:8086
      DUEL_SERVICE_URL: http://host.docker.internal:8084
      JWT_SECRET: yugioh-deck-management-super-secret-key-256bits-minimum
      GRADLE_USER_HOME: /tmp/gradle-home-community

  # ===== gateway-service =====
  gateway-service:
    image: gradle:8.7-jdk17
    container_name: gateway-service
    working_dir: /workspace
    command: sh -lc 'gradle --no-daemon --project-cache-dir /tmp/gradle-project-cache-gateway :gateway-service:bootJar && java -jar gateway-service/build/libs/*.jar'
    ports:
      - "8088:8088"
    volumes:
      - ./:/workspace
      - gradle-cache:/home/gradle/.gradle
    depends_on:
      - auth-service
      - card-service
      - deck-service
      - card-creator-service
      - proxy-service
      - community-service
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8086
      DECK_SERVICE_URL: http://deck-service:8081
      CARD_SERVICE_URL: http://card-service:8080
      COMMUNITY_SERVICE_URL: http://community-service:8087
      DUEL_SERVICE_URL: http://host.docker.internal:8084
      CARD_CREATOR_SERVICE_URL: http://card-creator-service:8083
      PROXY_SERVICE_URL: http://proxy-service:8085
      GRADLE_USER_HOME: /tmp/gradle-home-gateway

volumes:
  deck-db-data:
  creator-db-data:
  auth-db-data:
  community-db-data:
  gradle-cache:
