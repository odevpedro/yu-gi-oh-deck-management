server:
  port: 8086

spring:
  application:
    name: auth-service
  cloud:
    compatibility-verifier:
      enabled: false

  datasource:
    url: jdbc:postgresql://localhost:5435/authdb
    driver-class-name: org.postgresql.Driver
    username: auth_user
    password: auth_pass

  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:yugioh-deck-management-super-secret-key-256bits-minimum}
  expiration-ms: 3600000 # 1 hora
  refresh-expiration-ms: 604800000 # 7 dias
  skip-blacklist-check: true

logging:
  pattern:
    level: "%5p [cid=%X{correlationId}]"
