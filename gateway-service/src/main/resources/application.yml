server:
  port: 8088

spring:
  application:
    name: gateway-service
  cloud:
    compatibility-verifier:
      enabled: false
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/auth/**
        - id: deck-service
          uri: ${DECK_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/decks/**
        - id: card-service
          uri: ${CARD_SERVICE_URL:http://localhost:8080}
          predicates:
            - Path=/cards/**
        - id: community-service
          uri: ${COMMUNITY_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/players/**,/challenges/**
        - id: duel-service
          uri: ${DUEL_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/duels/**
        - id: card-creator-service
          uri: ${CARD_CREATOR_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/custom-cards/**
        - id: proxy-service
          uri: ${PROXY_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/proxy/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - http://localhost:5173
              - http://localhost:3000
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

gateway:
  rate-limit:
    requests-per-window: 120
    window: PT1M
